<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F86C9A"/>
      <stop offset="100%" style="stop-color:#E84A85"/>
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1"/>
      <stop offset="100%" style="stop-color:#F86C9A"/>
    </linearGradient>
  </defs>
  
  <!-- Logo图形：花瓣/叶子造型，象征美丽与青春 -->
  <g transform="translate(5, 5)">
    <!-- 外层花瓣 -->
    <ellipse cx="25" cy="25" rx="18" ry="22" fill="url(#leafGradient)" transform="rotate(-30, 25, 25)"/>
    <ellipse cx="25" cy="25" rx="18" ry="22" fill="url(#logoGradient)" transform="rotate(30, 25, 25)" opacity="0.8"/>
    <!-- 中心圆点 -->
    <circle cx="25" cy="25" r="8" fill="#fff"/>
    <circle cx="25" cy="25" r="4" fill="url(#logoGradient)"/>
    <!-- 科技感装饰线 -->
    <circle cx="25" cy="25" r="20" fill="none" stroke="url(#logoGradient)" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6"/>
  </g>
  
  <!-- 文字：初龄 -->
  <text x="55" y="32" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#333">
    初龄
  </text>
  <text x="55" y="50" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="11" font-weight="400" fill="#888">
    科技美肤
  </text>
</svg>
