<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F86C9A"/>
      <stop offset="100%" style="stop-color:#E84A85"/>
    </linearGradient>
    <linearGradient id="iconLeafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1"/>
      <stop offset="100%" style="stop-color:#F86C9A"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="48" height="48" rx="12" fill="url(#iconGradient)"/>
  
  <!-- 花瓣造型 -->
  <ellipse cx="24" cy="24" rx="12" ry="15" fill="#FFB6C1" transform="rotate(-30, 24, 24)" opacity="0.8"/>
  <ellipse cx="24" cy="24" rx="12" ry="15" fill="#fff" transform="rotate(30, 24, 24)" opacity="0.7"/>
  
  <!-- 中心 -->
  <circle cx="24" cy="24" r="6" fill="#fff"/>
  <circle cx="24" cy="24" r="3" fill="#F86C9A"/>
  
  <!-- 装饰 -->
  <circle cx="24" cy="24" r="16" fill="none" stroke="#fff" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
</svg>
