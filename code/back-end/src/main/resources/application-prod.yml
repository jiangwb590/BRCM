# ========================================
# BCRM 生产环境配置
# ========================================

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true

spring:
  application:
    name: bcrm-server

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bcrm}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: ${DB_USER:bcrm}
      password: ${DB_PASS:BCRM@2024#App}
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      stat-view-servlet:
        enabled: false
      web-stat-filter:
        enabled: false

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.bcrm.entity
  global-config:
    db-config:
      id-type: auto
    banner: false
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:BCRM-JWT-SECRET-KEY-2024-PRODUCTION-ENVIRONMENT}
  expiration: 86400000

logging:
  level:
    root: INFO
    com.bcrm: INFO
  file:
    name: /var/log/bcrm/bcrm.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

knife4j:
  enable: false
  production: true

bcrm:
  default-password: '123456'
  upload-path: ./uploads

# 互亿无线短信配置（验证码通知短信接口）
sms:
  ihuyi:
    enabled: ${SMS_ENABLED:true}
    api-id: ${SMS_API_ID:C67113901}
    api-key: ${SMS_API_KEY:422eacd0922096457af10caaf4822af4}
    sign-name: ${SMS_SIGN_NAME:合肥市蜀山区初龄美肤美容店}